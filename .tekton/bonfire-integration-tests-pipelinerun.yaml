---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: bonfire-integration-tests-pipelinerun-
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/RedHatInsights/curiosity-frontend
    pipelinesascode.tekton.dev/max-keep-runs: "3"
spec:
  timeouts:
    pipeline: 45m
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: "https://github.com/RedHatInsights/curiosity-frontend.git"
      - name: revision
        value: "main"
      - name: pathInRepo
        value: .tekton/bonfire-integration-tests-pipeline.yaml
  params:
    - name: PROJECT_TASKS_REVISION
      value: "main"
    # Bonfire configuration
    - name: BONFIRE_REPO
      value: "https://github.com/RedHatInsights/bonfire-tekton"
    - name: BONFIRE_REVISION
      value: "main"
    - name: BONFIRE_IMAGE
      value: "quay.io/redhat-services-prod/hcm-eng-prod-tenant/cicd-tools:latest"

    # Ephemeral environment configuration
    - name: NAMESPACE_RESERVE_DURATION
      value: "120m"

    # Application configuration
    - name: APP_NAME
      value: "rhsm"
    - name: COMPONENT_NAME
      value: "curiosity-frontend"
    - name: BONFIRE_COMPONENT_NAME
      value: "curiosity-frontend"
    - name: COMPONENTS_W_RESOURCES
      value: "app:rhsm"

    # Deployment configuration
    - name: REF_ENV
      value: "insights-stage"
    - name: EXTRA_DEPLOY_ARGS
      # TEMPORARY: pin chrome-service, insights-chrome, storage-broker to prod (app-interface).
      # Remove when Konflux publishes images for those components on main again.
      value: >-
        --no-remove-resources app:rhsm
        --exclude-components unleash-proxy
        --set-template-ref chrome-service=06bb9b76cc845de7d8d3278d1be4bc8c514f5edc
        --set-template-ref insights-chrome=a351281389bb8d860974db82d0c16311fefd1c5b
        --set-template-ref storage-broker=3e02a457370c867c63f45bb847f2dd52b6362c41
        --set-image-tag quay.io/redhat-services-prod/hcc-platex-services/chrome-service=06bb9b7
        --set-image-tag quay.io/redhat-services-prod/hcc-platex-services-tenant/insights-chrome=a351281
        --set-image-tag quay.io/redhat-services-prod/hcc-integrations-tenant/storage-broker=3e02a45
    - name: DEPLOY_FRONTENDS
      value: "true"
    - name: DEPLOY_TIMEOUT
      value: "1800"

    # IQE test configuration
    - name: IQE_PLUGINS
      value: "curiosity"
    - name: IQE_CJI_CLOWDAPP_NAME
      value: "rhsm"
    - name: IQE_MARKER_EXPRESSION
      value: "ephemeral"
    - name: IQE_FILTER_EXPRESSION
      value: ""
    - name: IQE_ENV
      value: "ephemeral"
    - name: IQE_ENV_VARS
      value: "DYNACONF_HTTP__DEFAULT_AUTH_TYPE=identity"
    - name: IQE_IMAGE_TAG
      value: "curiosity"
    - name: IQE_PLAYWRIGHT
      value: "true"
    - name: IQE_SELENIUM
      value: "false"
    - name: IQE_PARALLEL_ENABLED
      value: "false"
    - name: IQE_LOG_LEVEL
      value: "debug"
  workspaces:
    - name: artifacts
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
